# /etc/nginx/sites-available/dabusmusicstop.conf
# Symlink: ln -s /etc/nginx/sites-available/dabusmusicstop.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name dabusmusicstop.com www.dabusmusicstop.com;

    root /Server/dabusmusicstop.com;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|svg|ico|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Block dotfiles
    location ~ /\. {
        deny all;
    }
}

